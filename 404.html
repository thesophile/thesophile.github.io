<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <style>
    /* ── Themes ─────────────────────────────────────────────── */
    :root {
      --bg:        #c6d4a0;
      --dirt:      #8B6340;
      --dirt-dark: #6B4423;
      --stone:     #9a9a9a;
      --stone-dk:  #6e6e6e;
      --panel:     #c8c8c8;
      --panel-dk:  #9e9e9e;
      --panel-lt:  #f0f0f0;
      --text:      #1a1a1a;
      --text-btn:  #ffffff;
      --accent:    #4aaa00;
      --accent2:   #e63a00;
      --shadow:    rgba(0,0,0,0.55);
      --btn-face:  #8aad44;
      --btn-top:   #a8d454;
      --btn-bot:   #4a7a00;
      --sky1:      #78b4ff;
      --sky2:      #b8d8ff;
      --cloud:     rgba(255,255,255,0.88);
    }

    [data-theme="dark"] {
      --bg:        #1a2310;
      --dirt:      #5a3f22;
      --dirt-dark: #3a2510;
      --stone:     #555;
      --stone-dk:  #333;
      --panel:     #2e2e2e;
      --panel-dk:  #1c1c1c;
      --panel-lt:  #484848;
      --text:      #e8e8d0;
      --text-btn:  #e8e8d0;
      --accent:    #5dcc00;
      --accent2:   #ff5500;
      --shadow:    rgba(0,0,0,0.85);
      --btn-face:  #3a6b00;
      --btn-top:   #5a9a00;
      --btn-bot:   #1e3a00;
      --sky1:      #050e20;
      --sky2:      #0a1a40;
      --cloud:     rgba(255,255,255,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Press Start 2P', monospace;
      color: var(--text);
      image-rendering: pixelated;
      transition: color 0.2s;
      cursor: default;
    }

    /* ── Sky ─────────────────────────────────────────────────── */
    .sky {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, var(--sky1) 0%, var(--sky2) 100%);
      z-index: 0;
      transition: background 0.3s;
    }

    .cloud {
      position: absolute;
      background: var(--cloud);
      transition: background 0.3s;
    }
    .cloud-1 { width: 96px; height: 32px; top: 10%; left: -120px; animation: drift 30s linear infinite; }
    .cloud-2 { width: 64px; height: 24px; top: 20%; left: -80px;  animation: drift 40s linear infinite 8s; }
    .cloud-3 { width: 80px; height: 28px; top: 6%;  left: -100px; animation: drift 34s linear infinite 16s; }

    @keyframes drift {
      to { transform: translateX(110vw); }
    }

    /* ── Ground ──────────────────────────────────────────────── */
    .ground {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1;
    }
    .grass-row {
      height: 24px;
      background: var(--accent);
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.35), inset 0 4px 0 rgba(255,255,255,0.25);
      transition: background 0.2s;
    }
    .dirt-row {
      height: 52px;
      background: repeating-linear-gradient(
        90deg,
        var(--dirt) 0px, var(--dirt) 48px,
        var(--dirt-dark) 48px, var(--dirt-dark) 96px
      );
      box-shadow: inset 0 4px 0 rgba(0,0,0,0.15);
      transition: background 0.2s;
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 1.5rem;
      padding-bottom: 90px;
    }

    /* ── Panel ───────────────────────────────────────────────── */
    .mc-panel {
      background: var(--panel);
      border: 4px solid var(--panel-dk);
      box-shadow:
        inset  3px  3px 0 var(--panel-lt),
        inset -3px -3px 0 var(--panel-dk),
         6px   6px 0 var(--shadow);
      padding: 28px 32px 32px;
      max-width: 580px;
      width: 100%;
      animation: popIn 0.25s steps(3) both;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    @keyframes popIn {
      0%   { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* ── 404 ─────────────────────────────────────────────────── */
    .err-num {
      font-size: clamp(3rem, 13vw, 6rem);
      color: var(--accent2);
      text-shadow: 4px 4px 0 #7a1a00, -2px 2px 0 #5a1200;
      line-height: 1;
      margin-bottom: 18px;
      animation: flicker 5s steps(1) infinite;
    }

    @keyframes flicker {
      0%,88%,90%,92%,100% { opacity: 1; }
      89%, 91%             { opacity: 0.3; }
    }

    /* ── Stone divider ───────────────────────────────────────── */
    .stone-divider {
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        var(--stone) 0px, var(--stone) 16px,
        var(--stone-dk) 16px, var(--stone-dk) 32px
      );
      margin: 18px -32px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), inset 0 -2px 0 rgba(0,0,0,0.25);
      transition: background 0.2s;
    }

    /* ── Message ─────────────────────────────────────────────── */
    .err-tag {
      font-size: 0.42rem;
      color: var(--stone-dk);
      letter-spacing: 0.1em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .err-msg {
      font-size: clamp(0.42rem, 1.6vw, 0.58rem);
      line-height: 2.4;
      color: var(--text);
    }

    .err-msg .path {
      color: var(--accent2);
      word-break: break-all;
    }

    /* ── Button ──────────────────────────────────────────────── */
    .mc-btn {
      display: inline-block;
      margin-top: 22px;
      padding: 10px 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      color: var(--text-btn);
      background: var(--btn-face);
      border: none;
      text-decoration: none;
      box-shadow:
        inset  2px  2px 0 var(--btn-top),
        inset -2px -2px 0 var(--btn-bot),
        3px 3px 0 var(--shadow);
      cursor: pointer;
      transition: filter 0.05s, background 0.2s;
    }
    .mc-btn:hover  { filter: brightness(1.18); }
    .mc-btn:active {
      box-shadow:
        inset  2px  2px 0 var(--btn-bot),
        inset -2px -2px 0 var(--btn-top),
        1px 1px 0 var(--shadow);
      transform: translate(2px, 2px);
    }

    /* ── Creeper ─────────────────────────────────────────────── */
    .creeper {
      position: fixed;
      bottom: 76px;
      right: clamp(16px, 6vw, 64px);
      z-index: 3;
      width: 72px;
      height: 72px;
      image-rendering: pixelated;
      animation: bobble 1.8s steps(2) infinite;
    }

    @keyframes bobble {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
  </style>
</head>
<body>

<div class="sky">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
</div>

<div class="ground">
  <div class="grass-row"></div>
  <div class="dirt-row"></div>
</div>

<!-- Pixel creeper -->
<svg class="creeper" viewBox="0 0 16 20" xmlns="http://www.w3.org/2000/svg">
  <!-- head -->
  <rect x="2"  y="0"  width="12" height="12" fill="#5aab1e"/>
  <!-- eyes -->
  <rect x="3"  y="3"  width="3"  height="3"  fill="#111"/>
  <rect x="10" y="3"  width="3"  height="3"  fill="#111"/>
  <!-- mouth -->
  <rect x="5"  y="7"  width="2"  height="2"  fill="#111"/>
  <rect x="9"  y="7"  width="2"  height="2"  fill="#111"/>
  <rect x="5"  y="9"  width="6"  height="2"  fill="#111"/>
  <rect x="5"  y="11" width="2"  height="1"  fill="#111"/>
  <rect x="9"  y="11" width="2"  height="1"  fill="#111"/>
  <!-- body -->
  <rect x="4"  y="12" width="8"  height="6"  fill="#4a8a14"/>
  <!-- legs -->
  <rect x="4"  y="18" width="3"  height="2"  fill="#3a7010"/>
  <rect x="9"  y="18" width="3"  height="2"  fill="#3a7010"/>
</svg>

<div class="container">
  <div class="mc-panel">

    <div class="err-num">404</div>

    <div class="stone-divider"></div>

    <div class="err-tag">// error.log</div>
    <div class="err-msg">
      Ok genius.<br><br>
      Either you know something I don't,
      or you can't fricking spell
      whatever you mean by
      "<span class="path" id="path-display"></span>"
    </div>

    <div class="stone-divider"></div>

    <a class="mc-btn" href="/">⬅ Back to spawn</a>

  </div>
</div>

<script>
  // ── Theme sync ───────────────────────────────────────────────
  // Main page toggle: localStorage.setItem('theme', 'dark' | 'light')
  function applyTheme(t) {
    if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else              document.documentElement.removeAttribute('data-theme');
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  window.addEventListener('storage', e => { if (e.key === 'theme') applyTheme(e.newValue); });

  // ── Path display ─────────────────────────────────────────────
  document.getElementById('path-display').textContent = window.location.pathname;
</script>

</body>
</html>
