<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #10101a;
      --border: #1e1e2e;
      --text: #c9d1d9;
      --muted: #484f58;
      --accent: #58a6ff;
      --accent2: #f78166;
      --green: #3fb950;
      --yellow: #d29922;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
    }

    /* CRT scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Subtle grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 99;
      opacity: 0.3;
    }

    .container {
      display: grid;
      place-items: center;
      height: 100vh;
      padding: 2rem;
    }

    .terminal {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow:
        0 0 0 1px rgba(88,166,255,0.05),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(88,166,255,0.03);
      overflow: hidden;
      animation: fadeSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Window chrome */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #0d0d17;
      border-bottom: 1px solid var(--border);
    }

    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }

    .titlebar-text {
      flex: 1;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Terminal body */
    .body {
      padding: 28px 28px 32px;
    }

    .prompt-line {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 0.82rem;
    }

    .prompt {
      color: var(--green);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .cmd {
      color: var(--accent);
    }

    .output {
      margin: 16px 0 24px 0;
      padding: 16px 20px;
      background: rgba(0,0,0,0.25);
      border-left: 2px solid var(--accent2);
      border-radius: 0 4px 4px 0;
    }

    .error-code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(4rem, 14vw, 7.5rem);
      font-weight: 800;
      line-height: 1;
      color: var(--accent2);
      letter-spacing: -0.04em;
      text-shadow: 0 0 40px rgba(247,129,102,0.25);
      animation: glitch 6s infinite;
      margin-bottom: 2px;
    }

    @keyframes glitch {
      0%, 92%, 100% { text-shadow: 0 0 40px rgba(247,129,102,0.25); transform: translate(0); }
      93%  { transform: translate(-3px, 1px); text-shadow: 3px 0 0 rgba(88,166,255,0.6), -3px 0 0 rgba(247,129,102,0.6); }
      94%  { transform: translate(3px, -1px); text-shadow: -3px 0 0 rgba(88,166,255,0.6), 3px 0 0 rgba(247,129,102,0.6); }
      95%  { transform: translate(0); text-shadow: 0 0 40px rgba(247,129,102,0.25); }
    }

    .error-msg {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .error-desc {
      font-size: 0.83rem;
      color: var(--text);
      line-height: 1.6;
    }

    .error-desc span {
      color: var(--accent);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .suggestion-label {
      font-size: 0.72rem;
      color: var(--yellow);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .suggestion {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .suggestion::before {
      content: '→';
      color: var(--accent);
      font-size: 0.75rem;
    }

    .suggestion a {
      color: var(--accent);
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .suggestion a:hover {
      opacity: 0.75;
      text-decoration: underline;
    }

    /* Blinking cursor on last prompt */
    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 4px;
      border-radius: 1px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Ambient glow behind terminal */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(88,166,255,0.04) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .container { position: relative; z-index: 1; }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="container">
  <div class="terminal">

    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="titlebar-text">bash — ~/portfolio</span>
    </div>

    <div class="body">

      <div class="prompt-line">
        <span class="prompt">~/portfolio $</span>
        <span class="cmd">GET <span style="color:var(--text)">{{ window.location.pathname }}</span></span>
      </div>

      <div class="output">
        <div class="error-code">404</div>
        <div class="error-msg">ERROR: No such file or directory</div>
        <div class="error-desc">
          Ok genius. Either you know something I don't, or you can't fricking spell whatever you mean by <span id="path-display"></span>
        </div>
      </div>

      <hr class="divider" />

      <div class="suggestion-label">// suggestions</div>
      <div class="suggestions">
        <div class="suggestion"><a href="/">Go home</a></div>
        <div class="suggestion"><a href="/#projects">Browse projects</a></div>
        <div class="suggestion">Check the URL for typos</div>
      </div>

      <hr class="divider" />

      <div class="prompt-line" style="margin-bottom:0">
        <span class="prompt">~/portfolio $</span>
        <span class="cursor"></span>
      </div>

    </div>
  </div>
</div>

<script>
  // Show the actual path the user tried to visit
  const pathEl = document.getElementById('path-display');
  const path = window.location.pathname;
  pathEl.innerHTML = `<span style="color:var(--accent2)">"${path}"</span>`;

  // Also inject path into the first prompt line dynamically
  const cmdEl = document.querySelector('.cmd');
  cmdEl.innerHTML = `GET <span style="color:var(--text)">${path}</span>`;
</script>

</body>
</html>
